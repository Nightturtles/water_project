language: "en-US"
early_access: false
reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "main"
  path_filters:
    - "!supabase/migrations/**"
    - "!**/*.svg"
  path_instructions:
    - path: "**/*.js"
      instructions: |
        This project is currently vanilla JavaScript served as-is via GitHub
        Pages (no bundler, no TypeScript, no linter yet). Files are loaded as
        script tags and use global scope. Prefer review comments about runtime
        correctness, security (XSS via innerHTML, token handling), and Supabase
        row-level-security implications over style nits. Do not recommend
        TypeScript, ES module conversions, or build-tool changes — those are
        tracked separately in a planned Phase 3 migration.
    - path: "**/*.html"
      instructions: |
        Six HTML files are independent entry points (index, recipe, taste,
        library, login, minerals). Head structure is shared; flag drift between
        pages (e.g. analytics or Sentry snippets present in some but not all).

chat:
  auto_reply: true

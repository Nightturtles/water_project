language: "en-US"
early_access: false
reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "main"
  path_filters:
    - "!supabase/migrations/**"
    - "!**/*.svg"
  path_instructions:
    - path: "**/*.js"
      instructions: |
        This project is vanilla JavaScript served as-is via GitHub Pages (no
        bundler, script-tag loading, global scope). Four core files carry
        `// @ts-check` with JSDoc types (constants.js, metrics.js, storage.js,
        sync.js); others are untyped. Prefer review comments about runtime
        correctness, security (XSS via innerHTML, token handling), and
        Supabase row-level-security implications. Do not recommend ES module
        conversions, Vite/Webpack, or moving @supabase/supabase-js to npm —
        those are tracked as Full Phase 3, deliberately deferred. Do flag if a
        file would benefit from being added to tsconfig.json's include list,
        or if existing JSDoc types diverge from actual usage.
    - path: "**/*.html"
      instructions: |
        Six HTML files are independent entry points (index, recipe, taste,
        library, login, minerals). Head structure is shared; flag drift between
        pages (e.g. analytics or Sentry snippets present in some but not all).

chat:
  auto_reply: true

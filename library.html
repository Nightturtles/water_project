<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Library - Cafelytic</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <script src="analytics-init.js"></script>
  <script src="theme-init.js"></script>
</head>
<body>
  <header>
    <h1><span class="brand-cafe">cafe</span><span class="brand-lytic">lytic</span> Recipe Library</h1>
    <p class="subtitle">Browse recipes by method, roast, and flavor. Save favorites to your collection.</p>
  </header>

  <main id="rx-root"></main>

  <footer>
    <p>For feedback or questions send an email to <a href="mailto:info@cafelytic.com">info@cafelytic.com</a></p>
  </footer>

  <script defer src="constants.js"></script>
  <script type="module" src="/src/lib/legacy-globals.ts"></script>
  <script defer src="metrics.js"></script>
  <script defer src="library-data.js"></script>
  <script defer src="stock-editor.js"></script>
  <script defer src="recipe-browser.js"></script>
  <script defer src="my-recipes-ui.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      if (typeof window.ensurePublicRecipesLoaded === "function") {
        window.ensurePublicRecipesLoaded();
      }
      if (typeof window.mountRecipeBrowser === "function") {
        window.mountRecipeBrowser(document.getElementById("rx-root"));
      }
    });
    // Refresh on bfcache restore so the Realtime channel (torn down on
    // pagehide) re-subscribes via the next initSync().
    window.addEventListener("pageshow", function (e) {
      if (e.persisted) location.reload();
    });
  </script>
</body>
</html>

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run build:verify
      # Verify Capacitor's Android scaffold is in sync with dist/ and package.json.
      # iOS sync requires CocoaPods + macOS, so it runs locally before release
      # rather than in CI; a follow-up may add a macos-latest job if drift becomes a problem.
      - run: npx cap sync android --inline

  e2e:
    runs-on: ubuntu-latest
    # Fail fast if webServer hangs or browser wedges — protects the runner from
    # burning minutes on a stuck job.
    timeout-minutes: 15
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      # Use cached browser downloads when possible; fall back to a fresh install.
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - if: steps.pw-cache.outputs.cache-hit == 'true'
        # System deps aren't cached by the browser cache; install them only.
        run: npx playwright install-deps chromium
      - run: npm run test:e2e
        env:
          CAFELYTIC_TEST_EMAIL: ${{ secrets.CAFELYTIC_TEST_EMAIL }}
          CAFELYTIC_TEST_PASSWORD: ${{ secrets.CAFELYTIC_TEST_PASSWORD }}
      # Telemetry: post a one-line flake summary to the tracking issue on
      # push-to-main runs. Skipped silently on PRs and when the repo variable
      # FLAKE_TRACKING_ISSUE is unset (one-time setup). continue-on-error keeps
      # logger hiccups from masking the real e2e outcome.
      - name: Post flake summary to tracking issue
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.FLAKE_TRACKING_ISSUE != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GH_SHA: ${{ github.sha }}
        run: |
          body=$(node scripts/append-flake-log.cjs)
          gh issue comment "${{ vars.FLAKE_TRACKING_ISSUE }}" --body "$body" --repo "$GITHUB_REPOSITORY"
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Builds dist/ with Vite and publishes to GitHub Pages.
  # Gated to push-to-main; PRs never deploy. Depends on the full PR-gating
  # suite so a red typecheck/test/build or red e2e blocks the publish.
  deploy:
    needs: [typecheck-and-test, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      # SENTRY_AUTH_TOKEN gates @sentry/vite-plugin's sourcemap upload + release
      # injection. Scoped to the deploy job only: the typecheck-and-test job's
      # build runs without it so PR builds don't pollute Sentry with one
      # release per commit. errorHandler in vite.config.mts converts upload
      # failures (e.g. rotated token) to warnings, so a broken token still
      # produces a deployable dist/.
      - run: npm run build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
        id: deployment

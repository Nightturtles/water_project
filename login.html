<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Cafelytic</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-BGJWVRGJJC"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-BGJWVRGJJC');
  </script>
  <script src="theme-init.js"></script>
  <!-- Sentry (Browser JavaScript Loader) — see SENTRY_SETUP.md -->
  <script>
    window.sentryOnLoad = function () {
      Sentry.init({
        tracesSampleRate: 0.1,
        replaysSessionSampleRate: 0,
        replaysOnErrorSampleRate: 1.0,
        beforeSend: function (event) {
          if (event.request && event.request.cookies) delete event.request.cookies;
          return event;
        }
      });
    };
  </script>
  <script src="https://js.sentry-cdn.com/c99c13e5b1291bc31a11c864a400daca.min.js" crossorigin="anonymous"></script>
</head>
<body class="login-page">
  <header>
    <h1><span class="brand-cafe">cafe</span><span class="brand-lytic">lytic</span> Coffee Water Calculator</h1>
  </header>

  <main>
    <div class="login-card">
      <div class="login-mode-toggle" role="group" aria-label="Authentication mode">
        <button type="button" class="login-mode-btn active" id="signin-tab" aria-pressed="true">Sign in</button>
        <button type="button" class="login-mode-btn" id="signup-tab" aria-pressed="false">Create account</button>
      </div>

      <form class="login-form" id="login-form" novalidate>
        <div class="input-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" autocomplete="email" placeholder="you@example.com" required>
        </div>
        <div class="input-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" autocomplete="current-password" placeholder="Password" required>
        </div>
        <div class="login-error" id="login-error" role="alert" aria-live="polite"></div>
        <div class="login-success" id="login-success" role="status" aria-live="polite" style="display:none;"></div>
        <button type="submit" class="login-submit-btn" id="login-submit">Sign in</button>
      </form>

      <div class="login-divider">or</div>

      <button type="button" class="login-google-btn" id="google-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
    </div>
  </main>

  <footer>
    <p>For feedback or questions send an email to <a href="mailto:info@cafelytic.com">info@cafelytic.com</a></p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="constants.js"></script>
  <script src="storage.js"></script>
  <script src="sync.js"></script>
  <script src="ui-shared.js"></script>
  <script>
    const signinTab = document.getElementById('signin-tab');
    const signupTab = document.getElementById('signup-tab');
    const submitBtn = document.getElementById('login-submit');
    const emailInput = document.getElementById('login-email');
    const passwordInput = document.getElementById('login-password');
    const errorEl = document.getElementById('login-error');
    const successEl = document.getElementById('login-success');
    const googleBtn = document.getElementById('google-btn');

    let mode = 'signin';

    function setMode(newMode) {
      mode = newMode;
      const isSignin = mode === 'signin';
      signinTab.classList.toggle('active', isSignin);
      signinTab.setAttribute('aria-pressed', String(isSignin));
      signupTab.classList.toggle('active', !isSignin);
      signupTab.setAttribute('aria-pressed', String(!isSignin));
      submitBtn.textContent = isSignin ? 'Sign in' : 'Create account';
      passwordInput.autocomplete = isSignin ? 'current-password' : 'new-password';
      clearMessages();
    }

    function clearMessages() {
      errorEl.textContent = '';
      successEl.style.display = 'none';
      successEl.textContent = '';
    }

    function showError(msg) {
      errorEl.textContent = msg;
      successEl.style.display = 'none';
    }

    function showSuccess(msg) {
      successEl.textContent = msg;
      successEl.style.display = '';
      errorEl.textContent = '';
    }

    signinTab.addEventListener('click', () => setMode('signin'));
    signupTab.addEventListener('click', () => setMode('signup'));

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      console.log('Form submit fired, mode:', mode);
      console.log('signUpWithEmail available:', typeof window.signUpWithEmail);
      console.log('signInWithEmail available:', typeof window.signInWithEmail);
      console.log('supabaseClient available:', typeof window.supabaseClient);
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }
      submitBtn.disabled = true;
      clearMessages();
      try {
        if (mode === 'signin') {
          console.log('Calling signInWithEmail...');
          const { data, error } = await window.signInWithEmail(email, password);
          console.log('signIn response:', data, error);
          if (error) { showError(error.message); return; }
          if (typeof handleFirstLoginMerge === 'function') await handleFirstLoginMerge();
          window.location.href = 'index.html';
        } else {
          console.log('Calling signUpWithEmail...');
          const { data, error } = await window.signUpWithEmail(email, password);
          console.log('signUp response:', data, error);
          if (error) { showError(error.message); return; }
          setMode('signin');
          showSuccess('Check your email to confirm your account, then sign in.');
        }
      } catch (e) {
        console.error('Submit handler error:', e);
        showError(e.message || 'Something went wrong. Please try again.');
      } finally {
        submitBtn.disabled = false;
      }
    });

    googleBtn.addEventListener('click', async () => {
      googleBtn.disabled = true;
      clearMessages();
      try {
        const { error } = await signInWithGoogle();
        if (error) {
          showError(error.message);
          googleBtn.disabled = false;
        }
        // On success, OAuth redirect happens automatically
      } catch (err) {
        showError('Something went wrong. Please try again.');
        googleBtn.disabled = false;
      }
    });

    // Redirect if already logged in
    window.supabaseClient.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = 'index.html';
    });
  </script>
</body>
</html>

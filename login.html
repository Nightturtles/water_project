<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- CSP (defense in depth). 'unsafe-inline' stays until inline scripts are externalized;
       localhost / capacitor:// keep the Capacitor native build working; frame-ancestors is header-only. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://localhost capacitor://localhost; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://localhost capacitor://localhost; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://srlwgayrxzamxlodpsrq.supabase.co wss://srlwgayrxzamxlodpsrq.supabase.co https://*.ingest.us.sentry.io https://www.google-analytics.com https://*.google-analytics.com https://*.analytics.google.com https://www.googletagmanager.com https://localhost capacitor://localhost http://localhost; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in - Cafelytic</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <script src="analytics-init.js"></script>
  <script src="theme-init.js"></script>
</head>
<body class="login-page">
  <header>
    <h1><span class="brand-cafe">cafe</span><span class="brand-lytic">lytic</span> Coffee Water Calculator</h1>
  </header>

  <main>
    <div class="login-card">
      <div class="login-mode-toggle" role="group" aria-label="Authentication mode">
        <button type="button" class="login-mode-btn active" id="signin-tab" aria-pressed="true">Sign in</button>
        <button type="button" class="login-mode-btn" id="signup-tab" aria-pressed="false">Create account</button>
      </div>

      <form class="login-form" id="login-form" novalidate>
        <div class="input-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" autocomplete="email" placeholder="you@example.com" required>
        </div>
        <div class="input-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" autocomplete="current-password" placeholder="Password" required>
        </div>
        <div class="login-error" id="login-error" role="alert" aria-live="polite"></div>
        <div class="login-success" id="login-success" role="status" aria-live="polite" style="display:none;"></div>
        <button type="submit" class="login-submit-btn" id="login-submit">Sign in</button>
        <button type="button" class="login-text-link" id="forgot-link"
                style="background:none;border:none;color:var(--blue-600);cursor:pointer;font-size:0.85rem;margin-top:0.5rem;padding:0;">
          Forgot password?
        </button>
      </form>

      <button type="button" class="login-text-link" id="back-to-signin"
              style="display:none;background:none;border:none;color:var(--blue-600);cursor:pointer;font-size:0.85rem;margin-top:0.5rem;padding:0;">
        Back to sign in
      </button>

      <div class="login-divider">or</div>

      <button type="button" class="login-google-btn" id="google-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
    </div>
  </main>

  <footer>
    <p>For feedback or questions send an email to <a href="mailto:info@cafelytic.com">info@cafelytic.com</a></p>
    <p><a href="/privacy" id="privacy-link">Privacy policy</a></p>
  </footer>

  <script defer src="constants.js"></script>
  <script type="module" src="/src/lib/legacy-globals.ts"></script>
  <script>
    // Body wrapped in DOMContentLoaded so the legacy-globals.ts module
    // bridge (which imports supabase-client + sentry-init) and the remaining
    // deferred classic scripts have populated their globals on window before
    // any top-level calls below run.
    document.addEventListener("DOMContentLoaded", function () {
    const signinTab = document.getElementById('signin-tab');
    const signupTab = document.getElementById('signup-tab');
    const submitBtn = document.getElementById('login-submit');
    const emailInput = document.getElementById('login-email');
    const passwordInput = document.getElementById('login-password');
    const passwordGroup = passwordInput.closest('.input-group');
    const errorEl = document.getElementById('login-error');
    const successEl = document.getElementById('login-success');
    const googleBtn = document.getElementById('google-btn');
    const forgotLink = document.getElementById('forgot-link');
    const backToSigninLink = document.getElementById('back-to-signin');
    const modeToggle = document.querySelector('.login-mode-toggle');
    const divider = document.querySelector('.login-divider');

    // Apple Guideline 4.8 requires Sign in with Apple parity for any third-party
    // social sign-in on iOS. v1 sidesteps this by hiding Google sign-in on
    // native builds (web is unchanged). Sign in with Apple may follow in v1.1.
    // Capacitor exposes window.Capacitor only when running inside the native
    // shell; on the web build the property is undefined and this is a no-op.
    const isNativePlatform = !!(
      window.Capacitor &&
      typeof window.Capacitor.isNativePlatform === 'function' &&
      window.Capacitor.isNativePlatform()
    );
    if (isNativePlatform) {
      googleBtn.style.display = 'none';
      divider.style.display = 'none';
    }

    let mode = 'signin';

    function setMode(newMode) {
      mode = newMode;
      const isForgot = mode === 'forgot';
      const isSignin = mode === 'signin';

      if (isForgot) {
        passwordGroup.style.display = 'none';
        modeToggle.style.display = 'none';
        divider.style.display = 'none';
        googleBtn.style.display = 'none';
        forgotLink.style.display = 'none';
        backToSigninLink.style.display = '';
        submitBtn.textContent = 'Send reset link';
        passwordInput.value = '';
      } else {
        passwordGroup.style.display = '';
        modeToggle.style.display = '';
        // Skip the Google/divider reset on native so the 4.8 hide above sticks
        // when toggling between sign-in and create-account modes.
        if (!isNativePlatform) {
          divider.style.display = '';
          googleBtn.style.display = '';
        }
        forgotLink.style.display = '';
        backToSigninLink.style.display = 'none';
        signinTab.classList.toggle('active', isSignin);
        signinTab.setAttribute('aria-pressed', String(isSignin));
        signupTab.classList.toggle('active', !isSignin);
        signupTab.setAttribute('aria-pressed', String(!isSignin));
        submitBtn.textContent = isSignin ? 'Sign in' : 'Create account';
        passwordInput.autocomplete = isSignin ? 'current-password' : 'new-password';
      }
      clearMessages();
    }

    function clearMessages() {
      errorEl.textContent = '';
      successEl.style.display = 'none';
      successEl.textContent = '';
    }

    function showError(msg) {
      errorEl.textContent = msg;
      successEl.style.display = 'none';
    }

    function showSuccess(msg) {
      successEl.textContent = msg;
      successEl.style.display = '';
      errorEl.textContent = '';
    }

    signinTab.addEventListener('click', () => setMode('signin'));
    signupTab.addEventListener('click', () => setMode('signup'));
    forgotLink.addEventListener('click', () => setMode('forgot'));
    backToSigninLink.addEventListener('click', () => setMode('signin'));

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      if (!email || (mode !== 'forgot' && !password)) {
        showError(mode === 'forgot' ? 'Please enter your email.' : 'Please enter your email and password.');
        return;
      }
      submitBtn.disabled = true;
      clearMessages();
      try {
        if (mode === 'signin') {
          const { error } = await window.signInWithEmail(email, password);
          if (error) { showError(error.message); return; }
          window.location.href = 'index.html';
        } else if (mode === 'signup') {
          const { error } = await window.signUpWithEmail(email, password);
          if (error) { showError(error.message); return; }
          setMode('signin');
          showSuccess('Check your email to confirm your account, then sign in.');
        } else {
          const { error } = await window.resetPasswordForEmail(email);
          if (error) console.warn('reset request error (suppressed from UI):', error);
          showSuccess("If an account exists for that email, we've sent a reset link.");
        }
      } catch (e) {
        console.error('Submit handler error:', e);
        showError(e.message || 'Something went wrong. Please try again.');
      } finally {
        submitBtn.disabled = false;
      }
    });

    googleBtn.addEventListener('click', async () => {
      googleBtn.disabled = true;
      clearMessages();
      try {
        const { error } = await signInWithGoogle();
        if (error) {
          showError(error.message);
          googleBtn.disabled = false;
        }
        // On success, OAuth redirect happens automatically
      } catch (err) {
        showError('Something went wrong. Please try again.');
        googleBtn.disabled = false;
      }
    });

    // Redirect if already logged in
    window.supabaseClient.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = 'index.html';
    });
    });
  </script>
</body>
</html>

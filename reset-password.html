<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset password — Cafelytic</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-BGJWVRGJJC"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-BGJWVRGJJC');
  </script>
  <script src="theme-init.js"></script>
  <!-- Sentry (Browser JavaScript Loader) — see SENTRY_SETUP.md -->
  <script src="sentry-init.js"></script>
  <script src="https://js.sentry-cdn.com/c99c13e5b1291bc31a11c864a400daca.min.js" crossorigin="anonymous"></script>
</head>
<body class="login-page">
  <header>
    <h1><span class="brand-cafe">cafe</span><span class="brand-lytic">lytic</span> Coffee Water Calculator</h1>
  </header>

  <main>
    <div class="login-card">
      <h2 style="margin:0 0 1rem;font-size:1.1rem;">Reset password</h2>
      <form class="login-form" id="reset-form" novalidate>
        <div class="input-group">
          <label for="new-password">New password</label>
          <input type="password" id="new-password" autocomplete="new-password" placeholder="At least 6 characters" required>
        </div>
        <div class="input-group">
          <label for="confirm-password">Confirm new password</label>
          <input type="password" id="confirm-password" autocomplete="new-password" required>
        </div>
        <div class="login-error" id="reset-error" role="alert" aria-live="polite"></div>
        <div class="login-success" id="reset-success" role="status" aria-live="polite" style="display:none;"></div>
        <button type="submit" class="login-submit-btn" id="reset-submit">Update password</button>
      </form>
      <p style="text-align:center;margin:0.75rem 0 0;font-size:0.85rem;">
        <a href="login.html">Back to sign in</a>
      </p>
    </div>
  </main>

  <footer>
    <p>For feedback or questions send an email to <a href="mailto:info@cafelytic.com">info@cafelytic.com</a></p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="constants.js"></script>
  <script src="storage.js"></script>
  <script src="sync.js"></script>
  <script src="ui-shared.js"></script>
  <script>
    const resetForm = document.getElementById('reset-form');
    const newPasswordInput = document.getElementById('new-password');
    const confirmPasswordInput = document.getElementById('confirm-password');
    const resetSubmit = document.getElementById('reset-submit');
    const resetError = document.getElementById('reset-error');
    const resetSuccess = document.getElementById('reset-success');

    let recoverySessionReady = false;
    let invalidLinkShown = false;

    function showResetError(msg) {
      resetError.textContent = msg;
      resetSuccess.style.display = 'none';
      resetSuccess.textContent = '';
    }

    function showResetSuccess(msg) {
      resetSuccess.textContent = msg;
      resetSuccess.style.display = '';
      resetError.textContent = '';
    }

    function isRecoveryHash() {
      const params = new URLSearchParams(window.location.hash.slice(1));
      return params.get('type') === 'recovery';
    }

    function markRecoveryReady() {
      if (recoverySessionReady) return;
      recoverySessionReady = true;
      // Recover the UI if the 500ms timeout already marked the link invalid —
      // PASSWORD_RECOVERY can fire late if the SDK parses the hash slowly.
      if (invalidLinkShown) {
        resetSubmit.disabled = false;
        resetError.textContent = '';
        invalidLinkShown = false;
      }
    }

    window.supabaseClient.auth.onAuthStateChange((event) => {
      if (event === 'PASSWORD_RECOVERY') markRecoveryReady();
    });

    // Belt-and-suspenders: if the listener subscribes after the event fires,
    // the hash still has type=recovery until the SDK strips it.
    if (isRecoveryHash()) markRecoveryReady();

    setTimeout(() => {
      if (!recoverySessionReady && !isRecoveryHash()) {
        showResetError('This reset link is invalid or expired. Request a new one from the login page.');
        resetSubmit.disabled = true;
        invalidLinkShown = true;
      }
    }, 500);

    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPassword = newPasswordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      if (!newPassword || !confirmPassword) {
        showResetError('Please fill in both fields.');
        return;
      }
      if (newPassword !== confirmPassword) {
        showResetError('Passwords do not match.');
        return;
      }
      if (newPassword.length < 6) {
        showResetError('Password must be at least 6 characters.');
        return;
      }
      if (!recoverySessionReady) {
        showResetError('This reset link is invalid or expired. Request a new one from the login page.');
        return;
      }

      resetSubmit.disabled = true;
      try {
        const { error } = await window.supabaseClient.auth.updateUser({ password: newPassword });
        if (error) {
          showResetError(error.message);
          resetSubmit.disabled = false;
          return;
        }
        showResetSuccess('Password updated. Redirecting…');
        setTimeout(() => { window.location.href = 'index.html'; }, 800);
      } catch (err) {
        console.error('Password update error:', err);
        showResetError('Something went wrong. Please try again.');
        resetSubmit.disabled = false;
      }
    });
  </script>
</body>
</html>

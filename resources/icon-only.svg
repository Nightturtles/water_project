<!--
  Source for the iOS app icon and the Android adaptive icon. Full-bleed
  Ca-tile brand mark, dark navy background with the blue "Ca" centered.
  Mirrors favicon.svg's design language but tuned for the 1024x1024
  canvas. No stroke or rounded corners at the edge: iOS applies its own
  squircle mask automatically, and an edge stroke would get clipped.
  Content (the "20" top-left and "cafelytic" wordmark) sits inside the
  iOS safe area (~90% inset from each edge).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" fill="#111C2E"/>
  <text x="180" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="140" fill="#3A5272">20</text>
  <text x="512" y="640" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="440" font-weight="500" fill="#4B8FE0">Ca</text>
  <text x="512" y="860" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="120">
    <tspan fill="#4B8FE0">cafe</tspan><tspan fill="#E8EEF8">lytic</tspan>
  </text>
</svg>
